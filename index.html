<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Người Đặc Biệt</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ffafbd;
            --secondary-pink: #ffc3a0;
            --text-color: #5d5d5d;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-pink), var(--secondary-pink));
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            color: var(--text-color);
        }

        /* Hiệu ứng nền tim rơi */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Khung chứa chính (Glassmorphism) */
        .container {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-width: 400px;
            width: 90%;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #d81b60;
            margin-bottom: 20px;
        }

        p {
            line-height: 1.6;
            font-size: 1.1rem;
        }

        /* Nút bấm xịn xò */
        .btn-group {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.2);
            text-decoration: none;
            display: inline-block;
        }

        .btn-yes {
            background: linear-gradient(45deg, #ff4081, #ff80ab);
            color: white;
        }

        .btn-yes:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 8px 20px rgba(216, 27, 96, 0.4);
        }

        .btn-no {
            background: #fff;
            color: #ff4081;
            border: 1px solid #ff4081;
        }

        /* Nút nhạc nổi */
        .music-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            cursor: pointer;
        }

        .music-disk {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            animation: rotate 3s linear infinite;
            animation-play-state: paused;
        }

        .music-disk.playing {
            animation-play-state: running;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .container { padding: 25px; }
        }
    </style>
</head>
<body>

    <div class="hearts-container" id="hearts-container"></div>

    <div class="container">
        <!-- NỘI DUNG CHÍNH CỦA BẠN (GIỮ NGUYÊN) -->
        <h1>Gửi cậu... ❤️</h1>
        <p id="main-content">
            Cảm ơn cậu vì đã xuất hiện trong cuộc sống của tớ. 
            Mọi thứ trở nên dịu dàng hơn khi có cậu ở bên.
        </p>
        
        <div class="btn-group">
            <button class="btn btn-yes" onclick="celebrate()">Đồng ý</button>
            <button class="btn btn-no" id="noBtn" onmouseover="moveNoButton()">Không</button>
        </div>
    </div>

    <!-- Nhạc nền (Thay link nhạc của bạn vào src) -->
    <div class="music-player" onclick="toggleMusic()">
        <div class="music-disk" id="disk">
            🎵
        </div>
        <audio id="bgMusic" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // Hiệu ứng tim rơi
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-20px';
            heart.style.fontSize = (Math.random() * 10 + 10) + 'px';
            heart.style.opacity = Math.random();
            heart.style.transition = 'transform 5s linear, opacity 5s';
            heart.style.pointerEvents = 'none';
            heart.style.color = '#ff80ab';
            
            document.getElementById('hearts-container').appendChild(heart);

            setTimeout(() => {
                heart.style.transform = `translateY(100vh) rotate(${Math.random() * 360}deg)`;
                heart.style.opacity = '0';
            }, 100);

            setTimeout(() => heart.remove(), 6000);
        }

        setInterval(createHeart, 300);

        // Nút nhạc
        const music = document.getElementById('bgMusic');
        const disk = document.getElementById('disk');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                disk.classList.remove('playing');
            } else {
                music.play();
                disk.classList.add('playing');
            }
            isPlaying = !isPlaying;
        }

        // Logic nút "Không" chạy trốn (nếu bạn muốn xịn hơn)
        function moveNoButton() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        // Hành động khi nhấn "Đồng ý"
        function celebrate() {
            alert("Tớ biết là cậu sẽ đồng ý mà! Love youuuu! ❤️");
            // Bạn có thể thay bằng hiệu ứng pháo hoa hoặc chuyển trang khác
        }
    </script>
</body>
</html>
